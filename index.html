<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام CIVIL TECH 2025 - النسخة السحابية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; scroll-behavior: smooth; }
        .hero-pattern { background-color: #0f172a; background-image: url("https://www.transparenttextures.com/patterns/carbon-fibre.png"); background-attachment: fixed; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .animate-fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="hero-pattern text-white min-h-screen">

    <nav class="p-4 border-b border-white/10 sticky top-0 z-50 bg-slate-900/80 backdrop-blur-md">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <span class="text-2xl font-bold tracking-tighter cursor-pointer" onclick="location.reload()">CIVIL <span class="text-blue-500">TECH</span></span>
            <button id="logout-btn" onclick="location.reload()" class="hidden bg-red-500/20 text-red-400 px-4 py-2 rounded-lg text-sm border border-red-500/30 hover:bg-red-500/40 transition">خروج</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <section id="landing-section" class="text-center py-20 animate-fade-in">
            <h1 class="text-5xl md:text-7xl font-extrabold mb-6 italic">CIVIL <span class="text-blue-500">TECH</span></h1>
            <p class="text-gray-400 text-xl mb-12">بوابتكم نحو مستقبل الهندسة المدنية (Cloud Edition).</p>
            <div class="flex flex-col md:flex-row gap-4 justify-center">
                <button onclick="showSection('login-section')" class="bg-blue-600 hover:bg-blue-700 px-10 py-4 rounded-xl font-bold transition">دخول</button>
                <button onclick="showSection('register-section')" class="bg-white/10 hover:bg-white/20 border border-white/20 px-10 py-4 rounded-xl font-bold transition">تسجيل جديد</button>
            </div>
        </section>

        <section id="login-section" class="hidden max-w-md mx-auto bg-white text-gray-900 rounded-3xl p-8 shadow-2xl animate-fade-in">
            <h3 class="text-2xl font-bold mb-4 text-center">بوابة الدخول</h3>
            <form onsubmit="handleLogin(event)" class="space-y-4">
                <input type="email" id="login-email" required placeholder="البريد الإلكتروني" class="w-full p-3 bg-gray-100 rounded-xl border outline-none text-left">
                <input type="password" id="login-pass" required placeholder="كلمة المرور" class="w-full p-3 bg-gray-100 rounded-xl border outline-none text-left">
                <button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold hover:bg-blue-700">دخول</button>
            </form>
        </section>

        <section id="user-profile" class="hidden space-y-8 animate-fade-in">
            <div class="glass p-8 rounded-3xl border-t-4 border-t-blue-500 flex justify-between items-center">
                <h2 class="text-2xl font-bold text-white">مرحباً، <span id="user-display-name">...</span> 👋</h2>
            </div>
            <div id="participant-agenda-list" class="space-y-4"></div>
        </section>

        <section id="admin-dashboard" class="hidden animate-fade-in">
            <div class="glass p-8 rounded-3xl">
                <h3 class="text-xl font-bold mb-6 text-blue-400">إدارة الأجندة السحابية</h3>
                <div id="admin-agenda-inputs" class="space-y-3 mb-6"></div>
                <button onclick="addNewAgendaRow()" class="text-blue-400 text-sm mb-6">+ إضافة فقرة</button><br>
                <button onclick="saveAgenda()" class="bg-blue-600 px-8 py-3 rounded-xl font-bold transition">تحديث الأجندة عند الجميع</button>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Your Firebase config from the screenshot
        const firebaseConfig = {
            apiKey: "AIzaSyCZ6e0sp_Z9J01kWe1c-g3r1gL6-wUPUIA",
            authDomain: "civil-tech-5b623.firebaseapp.com",
            projectId: "civil-tech-5b623",
            storageBucket: "civil-tech-5b623.firebasestorage.app",
            messagingSenderId: "148609930472",
            appId: "1:148609930472:web:3424e5b863f8c5df63655d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentAgenda = [];

        // Global functions for buttons
        window.showSection = (id) => {
            document.querySelectorAll('main > section').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        };

        window.handleLogin = async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value.trim().toLowerCase();
            const pass = document.getElementById('login-pass').value;

            if (email === "admin@civil.com" && pass === "123") {
                showSection('admin-dashboard');
                return;
            }
            alert("لأغراض العرض، استخدم حساب الأدمن");
        };

        // Live sync with Firestore
        onSnapshot(doc(db, "conference", "data"), (snap) => {
            if (snap.exists()) {
                currentAgenda = snap.data().agenda || [];
                renderAgenda();
            }
        });

        function renderAgenda() {
            const list = document.getElementById('participant-agenda-list');
            const inputs = document.getElementById('admin-agenda-inputs');
            
            list.innerHTML = currentAgenda.map(a => `
                <div class="glass p-5 rounded-2xl flex gap-4">
                    <span class="font-bold text-blue-400">${a.time}</span>
                    <p>${a.title}</p>
                </div>
            `).join('');

            inputs.innerHTML = currentAgenda.map(a => `
                <div class="flex gap-2">
                    <input type="time" value="${a.time}" class="agenda-time-input bg-white/10 p-2 rounded-lg text-white">
                    <input type="text" value="${a.title}" class="agenda-title-input bg-white/10 p-2 rounded-lg text-white flex-1">
                </div>
            `).join('');
        }

        window.addNewAgendaRow = () => {
            const div = document.createElement('div');
            div.className = 'flex gap-2';
            div.innerHTML = `<input type="time" class="agenda-time-input bg-white/10 p-2 rounded-lg text-white"><input type="text" placeholder="العنوان" class="agenda-title-input bg-white/10 p-2 rounded-lg text-white flex-1">`;
            document.getElementById('admin-agenda-inputs').appendChild(div);
        };

        window.saveAgenda = async () => {
            const times = document.querySelectorAll('.agenda-time-input');
            const titles = document.querySelectorAll('.agenda-title-input');
            const newAgenda = Array.from(times).map((t, i) => ({ time: t.value, title: titles[i].value })).filter(a => a.time);
            await setDoc(doc(db, "conference", "data"), { agenda: newAgenda }, { merge: true });
            alert("تم التحديث السحابي!");
        };
    </script>
</body>
</html>
