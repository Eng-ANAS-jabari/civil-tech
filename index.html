<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام CIVIL TECH 2025 - النسخة السحابية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #0f172a; scroll-behavior: smooth; }
        .hero-pattern { background-image: url("https://www.transparenttextures.com/patterns/carbon-fibre.png"); }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .agenda-card { border-right: 4px solid #3b82f6; transition: all 0.3s ease; }
        .agenda-card:hover { transform: translateX(-5px); background: rgba(59, 130, 246, 0.1); }
        .admin-only { display: none; } /* مخفي بشكل افتراضي */
    </style>
</head>
<body class="hero-pattern text-white min-h-screen">

    <nav class="p-4 border-b border-white/10 sticky top-0 z-50 bg-slate-900/90 backdrop-blur-md">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <span class="text-2xl font-bold italic tracking-tighter uppercase cursor-pointer" onclick="location.reload()">CIVIL <span class="text-blue-500">TECH</span></span>
            <div class="flex items-center gap-4">
                <button id="admin-login-btn" onclick="toggleAdmin()" class="text-[10px] text-gray-600 hover:text-gray-400">إدارة</button>
                <div id="status" class="text-xs text-blue-400 font-bold px-4 py-1 bg-blue-500/10 rounded-full border border-blue-500/20 animate-pulse">جاري الربط...</div>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 py-10">
        <div class="glass p-8 rounded-3xl border-t-4 border-t-blue-500 mb-10 animate-fade-in text-center md:text-right">
            <h1 class="text-3xl font-extrabold mb-2">منصة المؤتمر السحابية 🛠️</h1>
            <p class="text-gray-400">مرحباً بك يا مهندس أنس. التحديثات تظهر هنا فورياً لجميع المشتركين.</p>
        </div>

        <section id="admin-panel" class="admin-only mb-10 space-y-6 p-6 border-2 border-dashed border-blue-500/30 rounded-3xl bg-blue-500/5">
            <h2 class="text-xl font-bold text-blue-400">لوحة تحكم المسؤول</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="glass p-4 rounded-xl space-y-3">
                    <p class="text-sm font-bold">إضافة فقرة أجندة:</p>
                    <input type="time" id="new-time" class="w-full bg-slate-800 p-2 rounded border border-white/10 text-white">
                    <input type="text" id="new-title" placeholder="عنوان الفقرة" class="w-full bg-slate-800 p-2 rounded border border-white/10 text-white">
                    <button onclick="addToAgenda()" class="w-full bg-blue-600 py-2 rounded font-bold">حفظ في السحاب</button>
                </div>
                <div class="glass p-4 rounded-xl space-y-3">
                    <p class="text-sm font-bold">رفع صورة للمعرض (URL):</p>
                    <input type="text" id="new-img-url" placeholder="رابط الصورة المباشر" class="w-full bg-slate-800 p-2 rounded border border-white/10 text-white">
                    <button onclick="addToGallery()" class="w-full bg-green-600 py-2 rounded font-bold">إضافة صورة</button>
                </div>
            </div>
        </section>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
            <div class="lg:col-span-2 space-y-6">
                <h3 class="text-2xl font-bold flex items-center gap-3">
                    <span class="w-2 h-8 bg-blue-500 rounded-full"></span>
                    الأجندة المباشرة
                </h3>
                <div id="agenda-container" class="space-y-4">
                    <div class="glass p-12 text-center text-gray-500">جاري مزامنة الفقرات...</div>
                </div>
            </div>

            <div class="space-y-6">
                <h3 class="text-2xl font-bold flex items-center gap-3">
                    <span class="w-2 h-8 bg-blue-500 rounded-full"></span>
                    معرض الصور
                </h3>
                <div id="gallery-container" class="grid grid-cols-2 gap-3 p-3 glass rounded-3xl min-h-[250px]">
                    <div class="col-span-2 text-center text-gray-600 py-20 italic text-sm">لا توجد صور حالياً</div>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAq46_s0TiEBJTrhOz05St1zU2FU3PLIao",
            authDomain: "civiltech-e0a16.firebaseapp.com",
            projectId: "civiltech-e0a16",
            storageBucket: "civiltech-e0a16.firebasestorage.app",
            messagingSenderId: "859519915000",
            appId: "1:859519915000:web:fd506ad7290e116e073c0d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // التوثيق التلقائي
        onAuthStateChanged(auth, async (user) => {
            if (!user) await signInAnonymously(auth);
            document.getElementById('status').innerText = "متصل بالسحاب ✓";
            document.getElementById('status').className = "text-xs text-green-400 font-bold px-4 py-1 bg-green-500/20 rounded-full border border-green-500/20";
            loadData();
        });

        // جلب البيانات حياً
        function loadData() {
            // الأجندة
            onSnapshot(query(collection(db, "agenda"), orderBy("time")), (snap) => {
                const data = snap.docs.map(doc => doc.data());
                renderAgenda(data);
            });

            // الصور
            onSnapshot(collection(db, "gallery"), (snap) => {
                const images = snap.docs.map(doc => doc.data().url);
                renderGallery(images);
            });
        }

        // وظائف الإضافة للمسؤول
        window.addToAgenda = async () => {
            const time = document.getElementById('new-time').value;
            const title = document.getElementById('new-title').value;
            if(time && title) {
                await addDoc(collection(db, "agenda"), { time, title });
                alert("تمت الإضافة!");
            }
        };

        window.addToGallery = async () => {
            const url = document.getElementById('new-img-url').value;
            if(url) {
                await addDoc(collection(db, "gallery"), { url });
                alert("تمت إضافة الصورة!");
            }
        };

        window.toggleAdmin = () => {
            const pass = prompt("كلمة مرور الإدارة:");
            if(pass === "123") {
                document.getElementById('admin-panel').style.display = 'block';
            }
        };

        function renderAgenda(data) {
            const container = document.getElementById('agenda-container');
            if (data.length === 0) {
                container.innerHTML = `<div class="glass p-12 text-center text-gray-500 italic">لا توجد فقرات بعد.</div>`;
                return;
            }
            container.innerHTML = data.map(item => `
                <div class="glass p-6 rounded-2xl flex items-center gap-6 agenda-card">
                    <div class="text-xl font-bold text-blue-500 w-24 border-l border-white/10 ml-4">${item.time}</div>
                    <div class="text-lg font-medium text-gray-200">${item.title}</div>
                </div>
            `).join('');
        }

        function renderGallery(images) {
            const container = document.getElementById('gallery-container');
            if (images.length === 0) return;
            container.innerHTML = images.map(img => `
                <div class="aspect-square rounded-xl overflow-hidden border border-white/5">
                    <img src="${img}" class="w-full h-full object-cover">
                </div>
            `).join('');
        }
    </script>
</body>
</html>
