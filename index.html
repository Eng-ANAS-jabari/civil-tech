<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام CIVIL TECH 2025 - النسخة السحابية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; scroll-behavior: smooth; background-color: #0f172a; }
        .hero-pattern { background-image: url("https://www.transparenttextures.com/patterns/carbon-fibre.png"); background-attachment: fixed; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .active-agenda-item { border-right: 4px solid #3b82f6; background: rgba(59, 130, 246, 0.15); transform: scale(1.02); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .live-indicator { animation: pulse-soft 2s infinite; }
        @keyframes pulse-soft { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .animate-fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="hero-pattern text-white min-h-screen">

    <nav class="p-4 border-b border-white/10 sticky top-0 z-50 bg-slate-900/80 backdrop-blur-md">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <span class="text-2xl font-bold tracking-tighter cursor-pointer" onclick="showSection('landing-section')">CIVIL <span class="text-blue-500">TECH</span></span>
            <div id="nav-actions" class="flex items-center gap-4">
                <div id="cloud-status" class="text-[10px] bg-blue-500/10 text-blue-400 px-3 py-1 rounded-full border border-blue-500/20">جاري الربط...</div>
                <button id="logout-btn" onclick="handleLogout()" class="hidden bg-red-500/20 text-red-400 px-4 py-2 rounded-lg text-sm border border-red-500/30 hover:bg-red-500/40 transition">خروج</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <section id="landing-section" class="text-center py-20 animate-fade-in">
            <div class="mb-6 inline-block bg-blue-500/10 text-blue-400 px-4 py-1 rounded-full text-sm border border-blue-500/20">المؤتمر الهندسي التقني 2025</div>
            <h1 class="text-5xl md:text-7xl font-extrabold mb-6 italic tracking-tight uppercase">CIVIL <span class="text-blue-500">TECH</span></h1>
            <p class="text-gray-400 text-xl mb-12 max-w-2xl mx-auto font-light leading-relaxed">بوابتكم نحو مستقبل الهندسة المدنية السحابي.</p>
            <div class="flex flex-col md:flex-row gap-4 justify-center">
                <button onclick="showSection('login-section')" class="bg-blue-600 hover:bg-blue-700 px-10 py-4 rounded-xl font-bold text-lg transition shadow-lg shadow-blue-500/20">دخول</button>
                <button onclick="showSection('register-section')" class="bg-white/10 hover:bg-white/20 border border-white/20 px-10 py-4 rounded-xl font-bold text-lg transition">تسجيل جديد</button>
            </div>
        </section>

        <section id="login-section" class="hidden max-w-md mx-auto bg-white text-gray-900 rounded-3xl p-8 shadow-2xl mt-10 animate-fade-in">
            <h3 class="text-2xl font-bold mb-4 text-center">دخول المنصة</h3>
            <form onsubmit="handleLogin(event)" class="space-y-4">
                <input type="email" id="login-email" required placeholder="البريد الإلكتروني" class="w-full p-3 bg-gray-100 rounded-xl outline-none text-left border focus:border-blue-500 transition">
                <input type="password" id="login-pass" required placeholder="كلمة المرور" class="w-full p-3 bg-gray-100 rounded-xl outline-none text-left border focus:border-blue-500 transition">
                <button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold hover:bg-blue-700 transition">تأكيد الدخول</button>
            </form>
            <p class="text-center mt-6 text-[10px] text-gray-400 italic">الإدارة: admin@civil.com | 123</p>
        </section>

        <section id="user-profile" class="hidden space-y-8 animate-fade-in">
            <div class="glass p-8 rounded-3xl flex flex-col md:flex-row justify-between items-center gap-4 border-t-4 border-t-blue-500">
                <div>
                    <h2 class="text-3xl font-bold">مرحباً، <span id="user-display-name">...</span> 👋</h2>
                    <span id="user-display-type" class="bg-blue-500/20 text-blue-400 px-3 py-1 rounded-full text-xs font-bold border border-blue-500/30 mt-2 inline-block">تحميل...</span>
                </div>
                <div class="text-left bg-white/5 p-4 rounded-2xl">
                    <p id="current-live-time" class="text-xl font-mono font-bold text-blue-400">00:00:00</p>
                </div>
            </div>
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="lg:col-span-2 space-y-4">
                    <h3 class="text-xl font-bold">📝 الأجندة السحابية المباشرة</h3>
                    <div id="participant-agenda-list" class="space-y-4"></div>
                </div>
                <div class="space-y-4">
                    <h3 class="text-xl font-bold">🖼️ معرض الصور</h3>
                    <div id="participant-gallery" class="grid grid-cols-2 gap-3"></div>
                </div>
            </div>
        </section>

        <section id="admin-dashboard" class="hidden animate-fade-in">
            <div class="glass p-8 rounded-3xl">
                <h3 class="text-xl font-bold mb-6 text-blue-400">لوحة تحكم CIVIL TECH</h3>
                <div id="admin-agenda-inputs" class="space-y-3 mb-6"></div>
                <button onclick="addNewAgendaRow()" class="text-blue-400 text-sm mb-6 hover:underline">+ فقرة جديدة</button><br>
                <button onclick="saveAgenda()" class="bg-blue-600 px-8 py-3 rounded-xl font-bold transition">حفظ وتحديث الأجندة عند الجميع</button>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection, query, orderBy } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAq46_s0TiEBJTrhOz05St1zU2FU3PLIao",
            authDomain: "civiltech-e0a16.firebaseapp.com",
            projectId: "civiltech-e0a16",
            storageBucket: "civiltech-e0a16.firebasestorage.app",
            messagingSenderId: "859519915000",
            appId: "1:859519915000:web:fd506ad7290e116e073c0d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // State
        let currentAgenda = [];

        // UI Functions
        window.showSection = (id) => {
            document.querySelectorAll('main > section').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        };

        // Real-time Agenda Sync
        onSnapshot(doc(db, "conference", "data"), (snap) => {
            if (snap.exists()) {
                currentAgenda = snap.data().agenda || [];
                renderAgendaUI();
                document.getElementById('cloud-status').innerText = "متصل سحابياً ✓";
                document.getElementById('cloud-status').className = "text-[10px] bg-green-500/20 text-green-400 px-3 py-1 rounded-full border border-green-500/20";
            }
        });

        window.handleLogin = async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value.trim().toLowerCase();
            const pass = document.getElementById('login-pass').value;

            if(email === "admin@civil.com" && pass === "123") {
                document.getElementById('logout-btn').classList.remove('hidden');
                showSection('admin-dashboard');
                return;
            }

            const userSnap = await getDoc(doc(db, "users", email));
            if(userSnap.exists() && userSnap.data().pass === pass) {
                const ud = userSnap.data();
                document.getElementById('user-display-name').innerText = ud.name;
                document.getElementById('user-display-type').innerText = ud.type;
                document.getElementById('logout-btn').classList.remove('hidden');
                showSection('user-profile');
            } else {
                alert("خطأ في البيانات!");
            }
        };

        function renderAgendaUI() {
            const list = document.getElementById('participant-agenda-list');
            const inputs = document.getElementById('admin-agenda-inputs');
            
            list.innerHTML = currentAgenda.map(item => `
                <div class="glass p-5 rounded-2xl flex gap-4 items-center">
                    <span class="font-bold text-blue-400 w-16">${item.time}</span>
                    <h4 class="font-bold">${item.title}</h4>
                </div>
            `).join('');

            inputs.innerHTML = currentAgenda.map(item => `
                <div class="flex gap-2">
                    <input type="time" value="${item.time}" class="agenda-time-input bg-white/5 border border-white/10 p-2 rounded-lg text-white w-32">
                    <input type="text" value="${item.title}" class="agenda-title-input bg-white/5 border border-white/10 p-2 rounded-lg text-white flex-1">
                </div>
            `).join('');
        }

        window.addNewAgendaRow = () => {
            const div = document.createElement('div');
            div.className = 'flex gap-2';
            div.innerHTML = `<input type="time" class="agenda-time-input bg-white/5 border border-white/10 p-2 rounded-lg text-white w-32"><input type="text" placeholder="عنوان الفقرة" class="agenda-title-input bg-white/5 border border-white/10 p-2 rounded-lg text-white flex-1">`;
            document.getElementById('admin-agenda-inputs').appendChild(div);
        };

        window.saveAgenda = async () => {
            const times = document.querySelectorAll('.agenda-time-input');
            const titles = document.querySelectorAll('.agenda-title-input');
            const newAgenda = Array.from(times).map((t, i) => ({ time: t.value, title: titles[i].value })).filter(a => a.time);
            await setDoc(doc(db, "conference", "data"), { agenda: newAgenda });
            alert("تم التحديث السحابي لجميع المشتركين!");
        };

        window.handleLogout = () => {
            document.getElementById('logout-btn').classList.add('hidden');
            showSection('landing-section');
        };

        setInterval(() => {
            document.getElementById('current-live-time').innerText = new Date().toLocaleTimeString('ar-EG', { hour12: false });
        }, 1000);
    </script>
</body>
</html>
